<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Marchés Boursiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--border:#E2DDD6;
  --text:#1A1714;--muted:#7A7268;--faint:#B0A898;--blue:#2C4A7C;
  --co-accent:#2C4A7C;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
header{position:sticky;top:0;background:#ffffffee;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:66px;padding:0 32px;display:flex;align-items:center;gap:16px;z-index:200}
.brand{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--blue);letter-spacing:.3px;white-space:nowrap;font-weight:500}
.mkt-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0}
.mkt-pills::-webkit-scrollbar{display:none}
.pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--muted);background:transparent;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.pill:hover,.pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.search-wrap{position:relative;margin-left:auto;flex-shrink:0}
#searchBtn{display:flex;align-items:center;gap:8px;padding:10px 22px;background:#EBF0FA;border:1px solid #2C4A7C44;border-radius:24px;color:var(--blue);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500}
#searchBox{display:none;align-items:center;gap:8px;background:#fff;border:2px solid var(--blue);border-radius:12px;padding:9px 18px;min-width:320px}
#searchBox input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:inherit}
#searchBox button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;line-height:1}
#results{position:absolute;top:calc(100%+8px);right:0;width:360px;background:#fff;border:1px solid var(--border);border-radius:14px;display:none;overflow:hidden;box-shadow:0 10px 40px #00000018;z-index:300}
.res-item{padding:12px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.res-item:last-child{border-bottom:none}
.res-item:hover{background:#EBF0FA}
.res-name{font-weight:600}.res-ticker{font-size:11px;color:var(--muted);margin-left:6px}
.res-ex{font-size:10px;background:#EBF0FA;color:var(--blue);padding:2px 8px;border-radius:5px;font-weight:500}

/* ── HOME ── */
#home main{max-width:1140px;margin:0 auto;padding:48px 32px}
.hero{margin-bottom:52px}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:62px;font-weight:400;line-height:1.05}
.hero p{font-size:14px;color:var(--muted);margin-top:10px}
.mkt-section{margin-bottom:52px;scroll-margin-top:80px}
.mkt-head{display:flex;align-items:baseline;gap:16px;margin-bottom:20px}
.mkt-label{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:500}
.mkt-sub{font-size:11px;color:var(--faint)}
.mkt-head::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── LOGO GRID ── */
.logo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
.logo-card{aspect-ratio:1;border-radius:16px;cursor:pointer;overflow:hidden;position:relative;border:1px solid var(--border);background:#fff;transition:transform .2s,box-shadow .2s}
.logo-card:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 10px 32px rgba(0,0,0,.12);z-index:2}
.logo-card img{width:56%;height:56%;object-fit:contain;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.logo-fb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:rgba(255,255,255,.85);text-align:center;pointer-events:none;width:80%;line-height:1.4;display:none}
.logo-tip{position:absolute;bottom:0;left:0;right:0;background:rgba(26,23,20,.84);backdrop-filter:blur(4px);padding:7px 8px;transform:translateY(100%);transition:transform .2s;text-align:center}
.logo-tip-name{font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-tip-cap{font-size:9px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.55);margin-top:2px}
.logo-card:hover .logo-tip{transform:translateY(0)}

/* ── SPINNER ── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px 0;color:var(--faint);font-size:14px}

/* ── DETAIL PAGE — fond beige neutre, accent sur données & graphiques seulement ── */
#detail{display:none;min-height:100vh;background:var(--bg)}
#detail .inner{max-width:980px;margin:0 auto;padding:32px 28px 80px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;background:var(--surface);margin-bottom:32px;transition:all .15s;font-weight:500}
.back-btn:hover{background:var(--border);color:var(--text)}

/* Hero block */
.co-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:28px}
.co-name-row{display:flex;align-items:center;gap:16px}
.co-logo{width:64px;height:64px;border-radius:14px;object-fit:contain;background:#fff;padding:8px;border:1px solid var(--border)}
.co-logo-fb{width:64px;height:64px;border-radius:14px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}
.co-name{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:var(--text);line-height:1.1}
.co-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:5px}
.co-price-block{text-align:right}
.co-price{font-size:32px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.co-chg{font-size:14px;font-weight:600;margin-top:4px}
.pos{color:#16a34a}.neg{color:#dc2626}

/* Accent bar under header */
.co-accent-bar{height:3px;border-radius:2px;background:var(--co-accent);margin-bottom:24px;opacity:.7}

/* KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.kpi{border-radius:12px;padding:13px 14px;border:1px solid var(--border);background:var(--surface);border-top:3px solid var(--co-accent)}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:6px}
.kpi-val{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.kpi-val.accent{color:var(--co-accent)}

/* 52W range */
.range-wrap{margin:8px 0 24px;display:flex;align-items:center;gap:10px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.range-track{flex:1;height:5px;background:var(--border);border-radius:3px;position:relative}
.range-fill{position:absolute;top:0;left:0;height:5px;background:linear-gradient(90deg,#f87171,#facc15,#4ade80);border-radius:3px}
.range-cursor{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid var(--co-accent);transform:translate(-50%,-50%);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Section titles */
.sec-title{display:flex;align-items:center;gap:14px;margin:36px 0 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--co-accent)}
.sec-title::before,.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Cards */
.card-d{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px}

/* Description */
.co-desc{font-size:13px;line-height:1.75;color:var(--muted);max-height:4.8em;overflow:hidden;transition:max-height .4s;cursor:pointer}
.co-desc.open{max-height:40em}
.desc-more{font-size:11px;color:var(--co-accent);cursor:pointer;margin-top:6px;display:inline-block;font-weight:500}

/* Tabs */
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:10px;padding:3px;border:1px solid var(--border)}
.tab-btn{padding:6px 14px;border-radius:8px;border:none;background:transparent;font-family:inherit;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s;font-weight:500}
.tab-btn.on{background:var(--co-accent);color:#fff;font-weight:600}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:right;padding:8px 10px;color:var(--faint);font-weight:600;font-size:10px;border-bottom:2px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.tbl th:first-child{text-align:left}
.tbl td{padding:8px 10px;font-family:'DM Mono',monospace;text-align:right;color:var(--text)}
.tbl td:first-child{text-align:left;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px}
.tbl tr:nth-child(even){background:var(--bg)}
.tbl tr:hover{background:#EBF0FA}
.row-list div{display:flex;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px}
.row-list div:last-child{border-bottom:none}
.row-list .lbl{color:var(--muted);font-size:11px}
.row-list .val{font-family:'DM Mono',monospace;color:var(--text)}
.row-list .bold .lbl{color:var(--text);font-weight:600}
.row-list .bold .val{color:var(--text);font-weight:700}

/* Charts */
.chart-wrap{position:relative;height:210px}
.chart-wrap-lg{position:relative;height:250px}

/* Analyst bar */
.rec-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:12px 0 6px;gap:2px}
.rec-seg{height:100%;border-radius:2px;transition:width .6s}
.rec-labels{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace;color:var(--faint);margin-top:4px}
.rec-counts{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.rec-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;margin-top:2px}
.rec-item{display:flex;align-items:flex-start;gap:5px;font-size:11px;color:var(--muted)}
.rec-n{font-weight:700;color:var(--text)}

/* Insights */
.insight{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);margin-bottom:8px;font-size:13px;line-height:1.65;color:var(--text)}
.insight-icon{font-size:17px;flex-shrink:0;margin-top:1px}

/* Target price */
.target-block{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
.target-item{text-align:center;padding:12px 18px;border-radius:12px;border:1px solid var(--border);background:var(--bg);min-width:90px}
.target-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:5px}
.target-val{font-size:19px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text)}
.target-upside{font-size:11px;margin-top:3px;font-weight:600}

/* Key facts */
.facts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.fact{display:flex;flex-direction:column;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg)}
.fact-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-bottom:4px}
.fact-val{font-size:13px;font-weight:500;color:var(--text)}

/* Error / retry */
.error-box{padding:48px;text-align:center}
.retry-btn{padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:opacity .15s}
.retry-btn:hover{opacity:.85}

/* Responsive */
@media(max-width:720px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .logo-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
  .co-name{font-size:26px}.co-price{font-size:24px}
  .hero h1{font-size:40px}.facts-grid{grid-template-columns:1fr}
  header{padding:0 18px;height:58px}
  #searchBtn{padding:8px 14px;font-size:13px}
}
@media(max-width:480px){
  .mkt-pills{display:none}.kpi-row{grid-template-columns:repeat(2,1fr)}
  .mkt-label{font-size:28px}.hero h1{font-size:34px}
}
</style>
</head>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const R  = o => o?.raw ?? null;
const Rf = o => o?.raw ?? 0;
const logoUrl = s => DOMAINS[s] ? `https://logo.clearbit.com/${DOMAINS[s]}` : null;

const fmt = (n,d=1) => {
  if(n==null||isNaN(n))return'—';
  const a=Math.abs(n);
  if(a>=1e12)return(n/1e12).toFixed(d)+'T';
  if(a>=1e9)return(n/1e9).toFixed(d)+'Md';
  if(a>=1e6)return(n/1e6).toFixed(d)+'M';
  return(+n).toFixed(d);
};
const fmtP  = n => n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';
const fmtR  = (n,d=2) => n==null||isNaN(n)?'—':(+n).toFixed(d);
const fmtTs = ts => ts ? new Date(ts*1000).toISOString().slice(0,7) : '—';
const fmtTsY= ts => ts ? new Date(ts*1000).getFullYear().toString() : '—';
const clr   = (v,pos='#16a34a',neg='#dc2626') => v!=null&&v>=0?pos:neg;

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {};

// ─── RECHERCHE ────────────────────────────────────────────────────────────────
let sTimer;
function openSearch(){
  document.getElementById('searchBtn').style.display='none';
  const b=document.getElementById('searchBox');b.style.display='flex';b.querySelector('input').focus();
}
function closeSearch(){
  document.getElementById('searchBtn').style.display='flex';
  document.getElementById('searchBox').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('searchInput').value='';
}
function doSearch(q){
  clearTimeout(sTimer);
  if(!q||q.length<2){document.getElementById('results').style.display='none';return;}
  sTimer=setTimeout(async()=>{
    try{
      const items=await fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r=>r.json());
      const el=document.getElementById('results');
      if(!items.length){el.style.display='none';return;}
      el.innerHTML=items.map(r=>`<div class="res-item" onclick="loadDetail('${r.symbol}')">
        <div><span class="res-name">${r.shortname||r.longname||r.symbol}</span><span class="res-ticker">${r.symbol}</span></div>
        <span class="res-ex">${r.exchDisp||''}</span>
      </div>`).join('');
      el.style.display='block';
    }catch(e){}
  },320);
}

// ─── HOMEPAGE (100% statique) ─────────────────────────────────────────────────
function loadHome(){
  const marketsEl=document.getElementById('markets');
  const pillsEl=document.getElementById('mktPills');
  pillsEl.innerHTML='';
  let html='';
  let first=true;
  for(const[name,companies] of Object.entries(COMPANIES)){
    const id='m'+name.replace(/[^a-z0-9]/gi,'');
    pillsEl.innerHTML+=`<button class="pill${first?' on':''}" onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth'});document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));this.classList.add('on')">${name}</button>`;
    first=false;
    html+=`<div class="mkt-section" id="${id}">
      <div class="mkt-head"><span class="mkt-label">${name}</span><span class="mkt-sub">${companies.length} entreprises</span></div>
      <div class="logo-grid">
        ${companies.map(co=>{
          const t=THEMES[co.s]||THEMES._;
          const logo=logoUrl(co.s);
          return`<div class="logo-card" style="background:${t.bg};border-color:${t.accent}44" onclick="loadDetail('${co.s}')">
            ${logo?`<img src="${logo}" alt="${co.s}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>`:''}
            <div class="logo-fb" style="${logo?'':'display:block'}">${co.s}</div>
            <div class="logo-tip">
              <div class="logo-tip-name">${co.n}</div>
              <div class="logo-tip-cap">Analyser →</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  marketsEl.innerHTML=html;
}

// ─── CHARGEMENT DETAIL ────────────────────────────────────────────────────────
async function loadDetail(ticker){
  closeSearch();
  document.getElementById('home').style.display='none';
  const d=document.getElementById('detail');
  d.style.display='block';
  d.style.removeProperty('background'); // toujours beige
  applyTheme(ticker);
  document.getElementById('detailContent').innerHTML=`<div class="loading"><span class="spinner"></span>Chargement des données…</div>`;
  Object.values(charts).forEach(c=>{try{c&&c.destroy();}catch(_){}});
  charts={price:null,revenue:null};

  try{
    const[data,hist]=await Promise.all([
      fetch(`/api/company?symbol=${encodeURIComponent(ticker)}`).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}),
      fetch(`/api/history?symbol=${encodeURIComponent(ticker)}`).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}),
    ]);
    state={ticker,data,hist};
    renderDetail();
  }catch(e){
    document.getElementById('detailContent').innerHTML=`
      <div class="error-box">
        <div style="font-size:36px;margin-bottom:16px">📡</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Données temporairement indisponibles</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto;line-height:1.6">
          Yahoo Finance peut être momentanément inaccessible depuis le serveur.<br>Réessayez dans quelques secondes.
        </div>
        <button class="retry-btn" onclick="loadDetail('${ticker}')">↻ Réessayer</button>
      </div>`;
  }
}

// ─── RENDER DETAIL ────────────────────────────────────────────────────────────
function renderDetail(){
  const{ticker,data,hist}=state;
  if(!data||data.error){
    document.getElementById('detailContent').innerHTML=`<div style="color:#dc2626;padding:24px;font-size:14px">Données non disponibles pour ${ticker}</div>`;
    return;
  }

  const th=THEMES[ticker]||THEMES._;
  const prof=data.assetProfile||{};
  const price=data.price||{};
  const sd=data.summaryDetail||{};
  const ks=data.defaultKeyStatistics||{};
  const fd=data.financialData||{};
  const rt=data.recommendationTrend?.trend?.[0]||{};

  const curPrice=R(price.regularMarketPrice);
  const chgPct=(R(price.regularMarketChangePercent)||0)*100;
  const mktCap=R(price.marketCap);
  const cur=price.currency||'';

  const pe=R(ks.trailingPE);
  const fpe=R(ks.forwardPE);
  const beta=R(sd.beta)||R(ks.beta);
  const divY=R(sd.dividendYield);
  const gm=R(fd.grossMargins);
  const roe=R(fd.returnOnEquity);

  const w52lo=R(sd.fiftyTwoWeekLow),w52hi=R(sd.fiftyTwoWeekHigh);
  const rangePos=w52lo&&w52hi&&curPrice?Math.max(0,Math.min(100,(curPrice-w52lo)/(w52hi-w52lo)*100)):null;

  const totalRec=(rt.strongBuy||0)+(rt.buy||0)+(rt.hold||0)+(rt.sell||0)+(rt.strongSell||0);
  const tgtMean=R(fd.targetMeanPrice),tgtHi=R(fd.targetHighPrice),tgtLo=R(fd.targetLowPrice);
  const upside=curPrice&&tgtMean?((tgtMean-curPrice)/curPrice*100):null;

  // Résultats trimestriels
  const qInc=data.incomeStatementHistoryQuarterly?.incomeStatementHistory||[];
  const incRows=qInc.slice(0,6).map(q=>{
    const rev=R(q.totalRevenue),gp=R(q.grossProfit),ni=R(q.netIncome),ebitda=R(q.ebitda);
    const gM=rev&&gp!=null?gp/rev:null,nM=rev&&ni!=null?ni/rev:null;
    return`<tr>
      <td>${fmtTs(R(q.endDate))}</td>
      <td>${fmt(rev)}</td>
      <td style="color:var(--co-accent)">${gM!=null?(gM*100).toFixed(1)+'%':'—'}</td>
      <td>${fmt(ebitda)}</td>
      <td style="color:${clr(ni)}">${fmt(ni)}</td>
      <td style="color:var(--co-accent)">${nM!=null?(nM*100).toFixed(1)+'%':'—'}</td>
    </tr>`;
  }).join('');

  // Résultats annuels (3 dernières années)
  const annInc=data.incomeStatementHistory?.incomeStatementHistory||[];
  const annRows=annInc.slice(0,4).map(q=>{
    const rev=R(q.totalRevenue),gp=R(q.grossProfit),ni=R(q.netIncome),ebitda=R(q.ebitda);
    const gM=rev&&gp!=null?gp/rev:null,nM=rev&&ni!=null?ni/rev:null;
    return`<tr>
      <td>${fmtTsY(R(q.endDate))}</td>
      <td>${fmt(rev)}</td>
      <td style="color:var(--co-accent)">${gM!=null?(gM*100).toFixed(1)+'%':'—'}</td>
      <td>${fmt(ebitda)}</td>
      <td style="color:${clr(ni)}">${fmt(ni)}</td>
      <td style="color:var(--co-accent)">${nM!=null?(nM*100).toFixed(1)+'%':'—'}</td>
    </tr>`;
  }).join('');

  // Bilan (trimestre le plus récent)
  const qBal=data.balanceSheetHistoryQuarterly?.balanceSheetStatements||[];
  const b=qBal[0]||{};
  const balRows=[
    ['Cash & équivalents',R(b.cash),false],
    ['Total actif courant',R(b.totalCurrentAssets),true],
    ['Total actifs',R(b.totalAssets),true],
    [null,null,false],
    ['Dettes fournisseurs',R(b.accountsPayable),false],
    ['Total passif courant',R(b.totalCurrentLiabilities),true],
    ['Dettes long terme',R(b.longTermDebt),false],
    ['Total dettes',R(b.totalLiab),true],
    ['Capitaux propres',R(b.totalStockholderEquity),true],
  ].map(([l,v,bold])=>l?`<div class="${bold?'bold':''}"><span class="lbl">${l}</span><span class="val">${fmt(v)}</span></div>`:'<div style="height:4px"></div>').join('');

  // Cash flow
  const qCF=data.cashflowStatementHistoryQuarterly?.cashflowStatements||[];
  const c=qCF[0]||{};
  const opCF=R(c.totalCashFromOperatingActivities);
  const capex=R(c.capitalExpenditures)||0;
  const fcf=opCF!=null?opCF+capex:null;
  const cfRows=[
    ['Cash flow opérationnel',opCF,true],
    ['dont Dépréciation / Amort.',R(c.depreciation),false],
    ['Investissements (Capex)',R(c.capitalExpenditures),false],
    ['Free Cash Flow',fcf,true],
    ['Dividendes versés',R(c.dividendsPaid),false],
    ["Rachats d'actions",R(c.repurchaseOfStock),false],
    ['Variation nette de trésorerie',R(c.changeInCash),true],
  ].map(([l,v,bold])=>`<div class="${bold?'bold':''}"><span class="lbl">${l}</span><span class="val" style="color:${clr(v)};font-weight:${bold?700:400}">${fmt(v)}</span></div>`).join('');

  // Analystes
  const recColors={strongBuy:'#16a34a',buy:'#4ade80',hold:'#facc15',sell:'#f97316',strongSell:'#ef4444'};
  const recLabels={strongBuy:'Fort achat',buy:'Achat',hold:'Neutre',sell:'Vente',strongSell:'Fort vente'};
  const recBar=totalRec?`
    <div class="rec-bar">${['strongBuy','buy','hold','sell','strongSell'].map(k=>`<div class="rec-seg" style="width:${((rt[k]||0)/totalRec*100).toFixed(1)}%;background:${recColors[k]}"></div>`).join('')}</div>
    <div class="rec-labels"><span>Fort achat</span><span>Neutre</span><span>Fort vente</span></div>
    <div class="rec-counts">${['strongBuy','buy','hold','sell','strongSell'].filter(k=>rt[k]>0).map(k=>`<div class="rec-item"><div class="rec-dot" style="background:${recColors[k]}"></div><span class="rec-n">${rt[k]}</span>&nbsp;${recLabels[k]}</div>`).join('')}</div>
  `:`<div style="color:var(--faint);font-size:12px">Aucune donnée analyste disponible</div>`;

  const targetBlock=(tgtMean||tgtHi||tgtLo)?`
    <div class="target-block">
      ${tgtLo?`<div class="target-item"><div class="target-label">Objectif bas</div><div class="target-val">${fmtR(tgtLo,2)}</div><div class="target-upside" style="color:${clr(tgtLo&&curPrice?tgtLo-curPrice:null)}">${tgtLo&&curPrice?((tgtLo-curPrice)/curPrice*100).toFixed(1)+'%':'—'}</div></div>`:''}
      ${tgtMean?`<div class="target-item" style="border-color:${th.accent}55;border-top:3px solid ${th.accent}"><div class="target-label">Objectif moyen</div><div class="target-val" style="color:var(--co-accent)">${fmtR(tgtMean,2)}</div><div class="target-upside" style="color:${clr(upside)}">${upside!=null?(upside>=0?'+':'')+upside.toFixed(1)+'%':'—'}</div></div>`:''}
      ${tgtHi?`<div class="target-item"><div class="target-label">Objectif haut</div><div class="target-val">${fmtR(tgtHi,2)}</div><div class="target-upside" style="color:#16a34a">${tgtHi&&curPrice?'+'+((tgtHi-curPrice)/curPrice*100).toFixed(1)+'%':'—'}</div></div>`:''}
    </div>`:'';

  const factsHtml=`<div class="facts-grid">
    <div class="fact"><div class="fact-label">Secteur</div><div class="fact-val">${prof.sector||'—'}</div></div>
    <div class="fact"><div class="fact-label">Industrie</div><div class="fact-val">${prof.industry||'—'}</div></div>
    <div class="fact"><div class="fact-label">Siège</div><div class="fact-val">${[prof.city,prof.country].filter(Boolean).join(', ')||'—'}</div></div>
    <div class="fact"><div class="fact-label">Employés</div><div class="fact-val">${prof.fullTimeEmployees?prof.fullTimeEmployees.toLocaleString('fr'):'—'}</div></div>
  </div>`;

  const insights=generateInsights(data,qInc);
  const insightsHtml=insights.map(i=>`<div class="insight"><span class="insight-icon">${i.icon}</span><span>${i.text}</span></div>`).join('');

  const tblHeader=`<table class="tbl"><thead><tr><th style="text-align:left">Période</th><th>Chiffre d'affaires</th><th>Marge brute</th><th>EBITDA</th><th>Résultat net</th><th>Marge nette</th></tr></thead>`;

  document.getElementById('detailContent').innerHTML=`
    <div class="co-top">
      <div class="co-name-row">
        ${logoUrl(ticker)?`<img class="co-logo" src="${logoUrl(ticker)}" alt="${ticker}" onerror="this.outerHTML='<div class=co-logo-fb>${ticker}</div>'">`:`<div class="co-logo-fb">${ticker}</div>`}
        <div>
          <div class="co-name">${R(price.longName)||R(price.shortName)||ticker}</div>
          <div class="co-meta">${ticker} · ${price.exchangeName||''} · ${prof.sector||''}</div>
        </div>
      </div>
      <div class="co-price-block">
        <div class="co-price">${fmtR(curPrice,2)} <span style="font-size:14px;color:var(--faint)">${cur}</span></div>
        <div class="co-chg ${chgPct>=0?'pos':'neg'}">${chgPct>=0?'+':''}${chgPct.toFixed(2)}% aujourd'hui</div>
      </div>
    </div>

    <div class="co-accent-bar"></div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Capitalisation</div><div class="kpi-val accent">${fmt(mktCap)}</div></div>
      <div class="kpi"><div class="kpi-label">PER (ttm)</div><div class="kpi-val">${pe?fmtR(pe,1)+'×':'—'}</div></div>
      <div class="kpi"><div class="kpi-label">PER fwd</div><div class="kpi-val">${fpe?fmtR(fpe,1)+'×':'—'}</div></div>
      <div class="kpi"><div class="kpi-label">Bêta</div><div class="kpi-val">${beta?fmtR(beta,2):'—'}</div></div>
      <div class="kpi"><div class="kpi-label">Marge brute</div><div class="kpi-val accent">${gm!=null?fmtR(gm*100,1)+'%':'—'}</div></div>
      <div class="kpi"><div class="kpi-label">ROE</div><div class="kpi-val accent">${roe!=null?fmtR(roe*100,1)+'%':'—'}</div></div>
    </div>

    ${rangePos!=null?`
    <div class="range-wrap">
      <span>${fmtR(w52lo,2)}</span>
      <div class="range-track">
        <div class="range-fill" style="width:100%"></div>
        <div class="range-cursor" style="left:${rangePos}%"></div>
      </div>
      <span>${fmtR(w52hi,2)}</span>
      <span style="color:var(--faint);font-size:10px">52 semaines</span>
    </div>`:''}

    ${prof.longBusinessSummary?`
    <div class="sec-title">À propos</div>
    <div class="card-d">
      ${factsHtml}
      <div style="margin-top:16px">
        <div class="co-desc" id="coDesc" onclick="this.classList.toggle('open');document.getElementById('descMore').textContent=this.classList.contains('open')?'Réduire ▲':'Lire plus ▼'">${prof.longBusinessSummary}</div>
        <span class="desc-more" id="descMore" onclick="document.getElementById('coDesc').classList.toggle('open');this.textContent=document.getElementById('coDesc').classList.contains('open')?'Réduire ▲':'Lire plus ▼'">Lire plus ▼</span>
      </div>
    </div>`:`
    <div class="sec-title">Informations</div>
    <div class="card-d">${factsHtml}</div>`}

    <div class="sec-title">États financiers</div>
    <div class="card-d">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px">
        <span style="font-size:13px;font-weight:600;color:var(--text)">Résultats — dernières périodes</span>
        <div class="tabs">
          <button class="tab-btn on" onclick="switchTab('income',this)">Trimestriel</button>
          <button class="tab-btn" onclick="switchTab('annual',this)">Annuel (3 ans)</button>
          <button class="tab-btn" onclick="switchTab('balance',this)">Bilan</button>
          <button class="tab-btn" onclick="switchTab('cashflow',this)">Cash Flow</button>
        </div>
      </div>
      <div id="tabContent" style="overflow-x:auto">
        ${tblHeader}<tbody>${incRows}</tbody></table>
      </div>
    </div>

    <div class="sec-title">Évolution du chiffre d'affaires</div>
    <div class="card-d"><div class="chart-wrap"><canvas id="revenueChart"></canvas></div></div>

    <div class="sec-title">Historique du cours — 2 ans</div>
    <div class="card-d"><div class="chart-wrap-lg"><canvas id="priceChart"></canvas></div></div>

    <div class="sec-title">Consensus analystes</div>
    <div class="card-d">
      ${totalRec?`<div style="font-size:11px;color:var(--faint);margin-bottom:10px">${totalRec} analystes couvrent cette valeur</div>`:''}
      ${recBar}
      ${targetBlock}
    </div>

    <div class="sec-title">Analyse fondamentale</div>
    <div class="card-d">
      ${insightsHtml||`<div style="color:var(--faint);font-size:13px;text-align:center;padding:16px">Données insuffisantes pour l'analyse</div>`}
    </div>

    <div style="text-align:center;font-size:10px;color:var(--faint);margin-top:28px;padding-bottom:8px">
      Données Yahoo Finance · Logos Clearbit · Ceci n'est pas un conseil en investissement
    </div>
  `;

  setTimeout(()=>{
    renderRevenueChart(qInc, th);
    renderPriceChart(hist, th);
  },60);
}

// ─── ONGLETS ─────────────────────────────────────────────────────────────────
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const{data}=state;
  const th=THEMES[state.ticker]||THEMES._;

  const qBal=data.balanceSheetHistoryQuarterly?.balanceSheetStatements||[];
  const qCF=data.cashflowStatementHistoryQuarterly?.cashflowStatements||[];
  const b=qBal[0]||{};
  const c=qCF[0]||{};
  const opCF=R(c.totalCashFromOperatingActivities);
  const capex=R(c.capitalExpenditures)||0;
  const fcf=opCF!=null?opCF+capex:null;
  const qInc=data.incomeStatementHistoryQuarterly?.incomeStatementHistory||[];
  const annInc=data.incomeStatementHistory?.incomeStatementHistory||[];
  const tblHeader=`<table class="tbl"><thead><tr><th style="text-align:left">Période</th><th>Chiffre d'affaires</th><th>Marge brute</th><th>EBITDA</th><th>Résultat net</th><th>Marge nette</th></tr></thead>`;

  const tabs={
    income:tblHeader+`<tbody>${qInc.slice(0,6).map(q=>{
      const rev=R(q.totalRevenue),gp=R(q.grossProfit),ni=R(q.netIncome),ebitda=R(q.ebitda);
      const gM=rev&&gp!=null?gp/rev:null,nM=rev&&ni!=null?ni/rev:null;
      return`<tr><td>${fmtTs(R(q.endDate))}</td><td>${fmt(rev)}</td><td style="color:var(--co-accent)">${gM!=null?(gM*100).toFixed(1)+'%':'—'}</td><td>${fmt(ebitda)}</td><td style="color:${clr(ni)}">${fmt(ni)}</td><td style="color:var(--co-accent)">${nM!=null?(nM*100).toFixed(1)+'%':'—'}</td></tr>`;
    }).join('')}</tbody></table>`,

    annual:tblHeader+`<tbody>${annInc.slice(0,4).map(q=>{
      const rev=R(q.totalRevenue),gp=R(q.grossProfit),ni=R(q.netIncome),ebitda=R(q.ebitda);
      const gM=rev&&gp!=null?gp/rev:null,nM=rev&&ni!=null?ni/rev:null;
      return`<tr><td>${fmtTsY(R(q.endDate))}</td><td>${fmt(rev)}</td><td style="color:var(--co-accent)">${gM!=null?(gM*100).toFixed(1)+'%':'—'}</td><td>${fmt(ebitda)}</td><td style="color:${clr(ni)}">${fmt(ni)}</td><td style="color:var(--co-accent)">${nM!=null?(nM*100).toFixed(1)+'%':'—'}</td></tr>`;
    }).join('')}</tbody></table>`,

    balance:`<div class="row-list">${[
      ['Cash & équivalents',R(b.cash),false],['Total actif courant',R(b.totalCurrentAssets),true],
      ['Total actifs',R(b.totalAssets),true],[null,null,false],
      ['Dettes fournisseurs',R(b.accountsPayable),false],['Total passif courant',R(b.totalCurrentLiabilities),true],
      ['Dettes long terme',R(b.longTermDebt),false],['Total dettes',R(b.totalLiab),true],
      ['Capitaux propres',R(b.totalStockholderEquity),true],
    ].map(([l,v,bold])=>l?`<div class="${bold?'bold':''}"><span class="lbl">${l}</span><span class="val">${fmt(v)}</span></div>`:'<div style="height:4px"></div>').join('')}</div>`,

    cashflow:`<div class="row-list">${[
      ['Cash flow opérationnel',opCF,true],['dont Dépréciation / Amort.',R(c.depreciation),false],
      ['Investissements (Capex)',R(c.capitalExpenditures),false],['Free Cash Flow',fcf,true],
      ['Dividendes versés',R(c.dividendsPaid),false],["Rachats d'actions",R(c.repurchaseOfStock),false],
      ['Variation nette de trésorerie',R(c.changeInCash),true],
    ].map(([l,v,bold])=>`<div class="${bold?'bold':''}"><span class="lbl">${l}</span><span class="val" style="color:${clr(v)};font-weight:${bold?700:400}">${fmt(v)}</span></div>`).join('')}</div>`,
  };
  document.getElementById('tabContent').innerHTML=tabs[tab]||'';
}

// ─── GRAPHIQUES ───────────────────────────────────────────────────────────────
const CHART_GRID  = 'rgba(0,0,0,.06)';
const CHART_TICK  = '#9a9088';

function renderRevenueChart(qInc,th){
  const el=document.getElementById('revenueChart');
  if(!el||!qInc.length)return;
  const items=qInc.slice(0,8).reverse();
  const labels=items.map(q=>fmtTs(R(q.endDate)));
  const revs=items.map(q=>R(q.totalRevenue));
  const margin=items.map(q=>{const rev=R(q.totalRevenue),ni=R(q.netIncome);return rev&&ni!=null?+(ni/rev*100).toFixed(1):null;});

  charts.revenue=new Chart(el,{type:'bar',data:{labels,datasets:[
    {label:'CA',data:revs,backgroundColor:th.accent+'44',borderColor:th.accent,borderWidth:2,borderRadius:5,yAxisID:'y'},
    {label:'Marge nette %',data:margin,type:'line',borderColor:'#16a34a',backgroundColor:'transparent',tension:.35,pointRadius:3,pointBackgroundColor:'#16a34a',borderWidth:2,yAxisID:'y1'},
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{labels:{color:CHART_TICK,font:{size:11},boxWidth:12,padding:12}}},
    scales:{
      x:{grid:{color:CHART_GRID},ticks:{color:CHART_TICK,font:{size:10}}},
      y:{grid:{color:CHART_GRID},ticks:{color:CHART_TICK,font:{size:10},callback:v=>fmt(v)}},
      y1:{position:'right',grid:{display:false},ticks:{color:'#16a34a',font:{size:10},callback:v=>v+'%'}},
    }
  }});
}

function renderPriceChart(hist,th){
  const el=document.getElementById('priceChart');
  if(!el||!hist?.timestamps?.length)return;
  const labels=hist.timestamps.map(ts=>new Date(ts*1000).toISOString().slice(0,7));
  const prices=hist.prices.map(p=>p?+p.toFixed(2):null);

  charts.price=new Chart(el,{type:'line',data:{labels,datasets:[{
    label:`Cours (${hist.currency||''})`,data:prices,
    borderColor:th.accent,backgroundColor:th.accent+'18',
    fill:true,tension:.3,pointRadius:0,pointHoverRadius:5,
    pointHoverBackgroundColor:th.accent,borderWidth:2.5,
  }]},options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${fmtR(ctx.parsed.y,2)} ${hist.currency||''}`}}},
    scales:{
      x:{grid:{color:CHART_GRID},ticks:{color:CHART_TICK,font:{size:10},maxTicksLimit:12}},
      y:{grid:{color:CHART_GRID},ticks:{color:CHART_TICK,font:{size:10},callback:v=>fmtR(v,0)}},
    }
  }});
}

// ─── INSIGHTS ─────────────────────────────────────────────────────────────────
function generateInsights(data,qInc){
  const fd=data.financialData||{};
  const ks=data.defaultKeyStatistics||{};
  const rt=data.recommendationTrend?.trend?.[0]||{};
  const out=[];

  if(qInc.length>=2){
    const r0=R(qInc[0].totalRevenue),r1=R(qInc[1].totalRevenue);
    if(r0&&r1){
      const g=((r0-r1)/Math.abs(r1))*100;
      if(g>10)out.push({icon:'📈',text:`Fort rebond du CA : +${g.toFixed(1)}% par rapport au trimestre précédent`});
      else if(g>0)out.push({icon:'↗️',text:`CA en progression de +${g.toFixed(1)}% par rapport au trimestre précédent`});
      else out.push({icon:'↘️',text:`CA en baisse de ${Math.abs(g).toFixed(1)}% par rapport au trimestre précédent`});
    }
  }
  const revG=R(fd.revenueGrowth);
  if(revG!=null){
    const g=revG*100;
    if(g>15)out.push({icon:'🚀',text:`Croissance annuelle du CA exceptionnelle : +${g.toFixed(1)}%`});
    else if(g<-5)out.push({icon:'⚠️',text:`Contraction du CA annuel : ${g.toFixed(1)}%`});
  }
  const gm=R(fd.grossMargins);
  if(gm!=null){
    if(gm>0.6)out.push({icon:'💪',text:`Marge brute exceptionnelle (${(gm*100).toFixed(1)}%) — fort pouvoir de fixation des prix`});
    else if(gm>0.3)out.push({icon:'✅',text:`Bonne marge brute de ${(gm*100).toFixed(1)}%`});
    else if(gm<0.1)out.push({icon:'⚠️',text:`Marge brute étroite (${(gm*100).toFixed(1)}%) — modèle à forte intensité de coûts`});
  }
  const nm=R(fd.profitMargins);
  if(nm!=null){
    if(nm>0.2)out.push({icon:'🌟',text:`Rentabilité remarquable : marge nette de ${(nm*100).toFixed(1)}%`});
    else if(nm>0.08)out.push({icon:'✅',text:`Marge nette correcte : ${(nm*100).toFixed(1)}%`});
    else if(nm<0)out.push({icon:'🔴',text:`Entreprise déficitaire : marge nette de ${(nm*100).toFixed(1)}%`});
  }
  const fcf=R(fd.freeCashflow),rev=R(fd.totalRevenue);
  if(fcf!=null&&rev){
    const m=fcf/rev;
    if(m>0.15)out.push({icon:'💰',text:`Excellent générateur de cash : FCF = ${fmt(fcf)} (${(m*100).toFixed(1)}% du CA)`});
    else if(m<0)out.push({icon:'⚠️',text:`Free cash flow négatif (${fmt(fcf)}) — surveiller la trésorerie`});
  }
  const roe=R(fd.returnOnEquity);
  if(roe!=null){
    if(roe>0.3)out.push({icon:'🏆',text:`Retour sur capitaux propres excellent : ROE ${(roe*100).toFixed(1)}%`});
    else if(roe<0)out.push({icon:'⚠️',text:`ROE négatif — capitaux propres négatifs ou pertes nettes`});
  }
  const dte=R(fd.debtToEquity);
  if(dte!=null){
    if(dte>150)out.push({icon:'⚠️',text:`Levier financier élevé (D/E : ${dte.toFixed(0)}%) — sensible aux remontées de taux`});
    else if(dte<20)out.push({icon:'🛡️',text:`Bilan solide, faiblement endetté (D/E : ${dte.toFixed(0)}%)`});
  }
  const cr=R(fd.currentRatio);
  if(cr!=null&&cr<1)out.push({icon:'⚠️',text:`Ratio de liquidité inférieur à 1 (${cr.toFixed(2)}) — tensions possibles à court terme`});
  const pe=R(ks.trailingPE);
  if(pe!=null&&pe>0){
    if(pe>40)out.push({icon:'💎',text:`Valorisation premium (PER ${pe.toFixed(1)}×) — le marché parie sur une croissance soutenue`});
    else if(pe<12)out.push({icon:'🎯',text:`PER attractif (${pe.toFixed(1)}×) — potentiellement sous-valorisé`});
  }
  const total=(rt.strongBuy||0)+(rt.buy||0)+(rt.hold||0)+(rt.sell||0)+(rt.strongSell||0);
  if(total>0){
    const bull=((rt.strongBuy||0)+(rt.buy||0))/total*100;
    if(bull>70)out.push({icon:'👍',text:`Consensus haussier fort : ${Math.round(bull)}% des ${total} analystes recommandent l'achat`});
    else if(bull<30)out.push({icon:'👎',text:`Analystes prudents : seulement ${Math.round(bull)}% recommandent l'achat (${total} avis)`});
    else out.push({icon:'🤝',text:`Consensus neutre : ${Math.round(bull)}% d'achats sur ${total} analystes`});
  }
  return out.slice(0,9);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadHome();
</script>
