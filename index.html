<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analyse Fondamentale</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#fff;--border:#E2DDD6;
  --text:#1A1714;--muted:#7A7268;--faint:#B0A898;--blue:#2C4A7C;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
header{position:sticky;top:0;background:#ffffffee;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:54px;padding:0 28px;display:flex;align-items:center;gap:14px;z-index:200;transition:background .3s,border-color .3s}
.brand{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--blue);letter-spacing:.3px;white-space:nowrap;transition:color .3s}
.mkt-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0}
.mkt-pills::-webkit-scrollbar{display:none}
.pill{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:500;color:var(--muted);background:transparent;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.pill:hover,.pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.search-wrap{position:relative;margin-left:auto;flex-shrink:0}
#searchBtn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:#EBF0FA;border:1px solid #2C4A7C44;border-radius:20px;color:var(--blue);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}
#searchBox{display:none;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--blue);border-radius:10px;padding:6px 14px;min-width:250px}
#searchBox input{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit}
#searchBox button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1}
#results{position:absolute;top:calc(100%+6px);right:0;width:300px;background:#fff;border:1px solid var(--border);border-radius:12px;display:none;overflow:hidden;box-shadow:0 8px 32px #00000014;z-index:300}
.res-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.res-item:last-child{border-bottom:none}
.res-item:hover{background:#EBF0FA}
.res-name{font-weight:600}.res-ticker{font-size:11px;color:var(--muted);margin-left:6px}
.res-ex{font-size:10px;background:#EBF0FA;color:var(--blue);padding:2px 7px;border-radius:5px;font-weight:500}

/* ── HOME ── */
#home main{max-width:1100px;margin:0 auto;padding:40px 28px}
.hero{margin-bottom:44px}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:400;line-height:1.1}
.hero p{font-size:13px;color:var(--muted);margin-top:8px}
.mkt-section{margin-bottom:48px;scroll-margin-top:68px}
.mkt-head{display:flex;align-items:baseline;gap:14px;margin-bottom:18px}
.mkt-label{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500}
.mkt-sub{font-size:11px;color:var(--faint)}
.mkt-head::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── LOGO GRID ── */
.logo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
.logo-card{aspect-ratio:1;border-radius:16px;cursor:pointer;overflow:hidden;position:relative;border:1px solid var(--border);background:#fff;transition:transform .2s,box-shadow .2s}
.logo-card:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 10px 32px rgba(0,0,0,.1);z-index:2}
.logo-card img{width:56%;height:56%;object-fit:contain;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.logo-fb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:rgba(255,255,255,.8);text-align:center;pointer-events:none;width:80%;line-height:1.4;display:none}
.logo-tip{position:absolute;bottom:0;left:0;right:0;background:rgba(26,23,20,.82);backdrop-filter:blur(4px);padding:7px 8px;transform:translateY(100%);transition:transform .2s;text-align:center}
.logo-tip-name{font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-tip-cap{font-size:9px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.6);margin-top:2px}
.logo-card:hover .logo-tip{transform:translateY(0)}

/* ── SPINNER / LOADING ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px 0;color:var(--faint)}

/* ── DETAIL PAGE ── */
#detail{display:none;min-height:100vh}
#detail .inner{max-width:960px;margin:0 auto;padding:28px 24px 80px}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.05);margin-bottom:28px;transition:all .15s}
.back-btn:hover{background:rgba(255,255,255,.12);color:#fff}

/* Hero block */
.co-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:24px}
.co-name-row{display:flex;align-items:center;gap:14px}
.co-logo{width:60px;height:60px;border-radius:14px;object-fit:contain;background:rgba(255,255,255,.95);padding:8px;border:1px solid rgba(255,255,255,.2)}
.co-logo-fb{width:60px;height:60px;border-radius:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,.7)}
.co-name{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;color:#fff;line-height:1.1}
.co-meta{font-size:11px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;margin-top:5px}
.co-price-block{text-align:right}
.co-price{font-size:30px;font-weight:600;font-family:'DM Mono',monospace;color:#fff}
.co-chg{font-size:14px;font-weight:500;margin-top:4px}
.pos{color:#4ade80}.neg{color:#f87171}

/* KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
.kpi{border-radius:12px;padding:12px 14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05)}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);margin-bottom:5px}
.kpi-val{font-size:16px;font-weight:600;font-family:'DM Mono',monospace;color:#fff}
.kpi-val.accent{color:var(--co-accent,#88aaff)}

/* 52W range */
.range-wrap{margin:8px 0 20px;display:flex;align-items:center;gap:10px;font-size:11px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.4)}
.range-track{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;position:relative}
.range-fill{position:absolute;top:0;left:0;height:4px;background:linear-gradient(90deg,#f87171,#facc15,#4ade80);border-radius:2px}
.range-cursor{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid var(--co-accent,#88aaff);transform:translate(-50%,-50%)}

/* Section titles */
.sec-title{display:flex;align-items:center;gap:14px;margin:32px 0 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.35)}
.sec-title::before,.sec-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

/* Cards */
.card-d{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:14px}

/* Description */
.co-desc{font-size:13px;line-height:1.7;color:rgba(255,255,255,.55);max-height:4.8em;overflow:hidden;transition:max-height .4s;cursor:pointer}
.co-desc.open{max-height:40em}
.desc-more{font-size:11px;color:var(--co-accent,#88aaff);cursor:pointer;margin-top:6px;display:inline-block}

/* Tabs */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.06);border-radius:9px;padding:3px}
.tab-btn{padding:5px 12px;border-radius:7px;border:none;background:transparent;font-family:inherit;font-size:11px;cursor:pointer;color:rgba(255,255,255,.5);transition:all .15s}
.tab-btn.on{background:var(--co-accent,#4466cc);color:#fff;font-weight:600}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:right;padding:7px 10px;color:rgba(255,255,255,.3);font-weight:500;font-size:10px;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap}
.tbl th:first-child{text-align:left}
.tbl td{padding:7px 10px;font-family:'DM Mono',monospace;text-align:right;color:rgba(255,255,255,.75)}
.tbl td:first-child{text-align:left;color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;font-size:11px}
.tbl tr:nth-child(even){background:rgba(255,255,255,.02)}
.tbl tr:hover{background:rgba(255,255,255,.05)}
.row-list div{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.row-list div:last-child{border-bottom:none}
.row-list .lbl{color:rgba(255,255,255,.4);font-size:11px}
.row-list .val{font-family:'DM Mono',monospace;color:rgba(255,255,255,.8)}
.row-list .bold .lbl,.row-list .bold .val{color:#fff;font-weight:600}

/* Charts */
.chart-wrap{position:relative;height:200px}
.chart-wrap-lg{position:relative;height:240px}

/* Analyst bar */
.rec-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:12px 0 6px;gap:2px}
.rec-seg{height:100%;border-radius:2px;transition:width .6s}
.rec-labels{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.4);margin-top:4px}
.rec-counts{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.rec-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;margin-top:2px}
.rec-item{display:flex;align-items:flex-start;gap:5px;font-size:11px;color:rgba(255,255,255,.5)}
.rec-n{font-weight:600;color:rgba(255,255,255,.85)}

/* Insights */
.insight{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04);margin-bottom:7px;font-size:13px;line-height:1.6;color:rgba(255,255,255,.8)}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* Target price */
.target-block{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.target-item{text-align:center;padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04)}
.target-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.35);margin-bottom:4px}
.target-val{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:#fff}
.target-upside{font-size:11px;margin-top:3px}

/* Key facts */
.facts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.fact{display:flex;flex-direction:column;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03)}
.fact-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.3);margin-bottom:4px}
.fact-val{font-size:13px;font-weight:500;color:rgba(255,255,255,.8)}

/* Responsive */
@media(max-width:720px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .logo-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
  .co-name{font-size:24px}.co-price{font-size:22px}
  .hero h1{font-size:32px}.facts-grid{grid-template-columns:1fr}
}
@media(max-width:420px){.mkt-pills{display:none}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header id="mainHeader">
  <div class="brand">✦ Analyse Fondamentale</div>
  <div class="mkt-pills" id="mktPills"></div>
  <div class="search-wrap">
    <button id="searchBtn" onclick="openSearch()">⌕ Rechercher</button>
    <div id="searchBox">
      <span style="color:var(--muted)">⌕</span>
      <input id="searchInput" placeholder="Apple, LVMH, AAPL…" oninput="doSearch(this.value)" onkeydown="if(event.key==='Escape')closeSearch()"/>
      <button onclick="closeSearch()">✕</button>
    </div>
    <div id="results"></div>
  </div>
</header>

<div id="home">
  <main>
    <div class="hero">
      <h1>Marchés financiers</h1>

  </main>
</div>

<div id="detail">
  <div class="inner">
    <button class="back-btn" onclick="showHome()">← Marchés</button>
    <div id="detailContent"></div>
  </div>
</div>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const R  = o => o?.raw ?? null;          // extract .raw from Yahoo Finance format
const Rf = o => o?.raw ?? 0;

const fmt = (n,d=1) => {
  if(n==null||isNaN(n))return'—';
  const a=Math.abs(n);
  if(a>=1e12)return(n/1e12).toFixed(d)+'T';
  if(a>=1e9)return(n/1e9).toFixed(d)+'Md';
  if(a>=1e6)return(n/1e6).toFixed(d)+'M';
  return(+n).toFixed(d);
};
const fmtP  = n => n==null||isNaN(n)?'—':(n*100).toFixed(1)+'%';
const fmtR  = (n,d=2) => n==null||isNaN(n)?'—':(+n).toFixed(d);
const fmtTs = ts => ts ? new Date(ts*1000).toISOString().slice(0,7) : '—';

// ─── LOAD DETAIL ──────────────────────────────────────────────────────────────
async function loadDetail(ticker){
  closeSearch();
  document.getElementById('home').style.display='none';
  const d=document.getElementById('detail');
  d.style.display='block';
  applyTheme(ticker);
  document.getElementById('detailContent').innerHTML=`<div class="loading" style="color:rgba(255,255,255,.4)"><span class="spinner"></span>Chargement…</div>`;
  Object.values(charts).forEach(c=>{try{c&&c.destroy();}catch(_){}});
  charts={price:null,revenue:null};

  const apiFetch = async (path) => {
    // Try Vercel function first, then CORS proxy fallback
    try {
      const r = await fetch(path);
      if (!r.ok) throw new Error('status '+r.status);
      return r.json();
    } catch(_) {
      const base = 'https://api.allorigins.win/raw?url=';
      const r2 = await fetch(base + encodeURIComponent('https://'+location.host+path));
      if (!r2.ok) throw new Error('proxy failed');
      return r2.json();
    }
  };

  try{
    const[data,hist]=await Promise.all([
      apiFetch(`/api/company?symbol=${ticker}`),
      apiFetch(`/api/history?symbol=${ticker}`),
    ]);
    state={ticker,data,hist};
    renderDetail();
  }catch(e){
    document.getElementById('detailContent').innerHTML=`<div style="color:#f87171;padding:20px;font-size:13px">Erreur de chargement : ${e.message}<br><br><small style="color:rgba(255,255,255,.3)">Les données Yahoo Finance peuvent être temporairement indisponibles. Réessayez dans quelques instants.</small></div>`;
  }
}

    balance:`<div class="row-list">${[
      ['Cash & équivalents',R(b.cash),false],['Total actif courant',R(b.totalCurrentAssets),true],
      ['Total actifs',R(b.totalAssets),true],[null,null,false],
      ['Dettes fournisseurs',R(b.accountsPayable),false],['Total passif courant',R(b.totalCurrentLiabilities),true],
      ['Dettes long terme',R(b.longTermDebt),false],['Total dettes',R(b.totalLiab),true],
      ['Capitaux propres',R(b.totalStockholderEquity),true],
    ].map(([l,v,bold])=>l?`<div class="${bold?'bold':''}"><span class="lbl">${l}</span><span class="val" style="color:${bold?'#fff':'rgba(255,255,255,.75)'}">${fmt(v)}</span></div>`:'<div style="height:4px"></div>').join('')}</div>`,
    cashflow:`<div class="row-list">${[
      ['Cash flow opérationnel',opCF,true],['dont Dépréciation / Amort.',R(c.depreciation),false],
      ['Investissements (Capex)',R(c.capitalExpenditures),false],['Free Cash Flow',fcf,true],
      ['Dividendes versés',R(c.dividendsPaid),false],["Rachats d'actions",R(c.repurchaseOfStock),false],
      ['Variation nette de trésorerie',R(c.changeInCash),true],
    ].map(([l,v,bold])=>`<div class="${bold?'bold':''}"><span class="lbl">${l}</span><span class="val" style="color:${v!=null&&v>=0?'#4ade80':'#f87171'};font-weight:${bold?600:400}">${fmt(v)}</span></div>`).join('')}</div>`,
  };
  document.getElementById('tabContent').innerHTML=tabs[tab]||'';
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
function renderRevenueChart(qInc,th){
  const el=document.getElementById('revenueChart');
  if(!el||!qInc.length)return;
  const items=qInc.slice(0,8).reverse();
  const labels=items.map(q=>fmtTs(R(q.endDate)));
  const revs=items.map(q=>R(q.totalRevenue));
  const margin=items.map(q=>{const rev=R(q.totalRevenue),ni=R(q.netIncome);return rev&&ni!=null?+(ni/rev*100).toFixed(1):null;});

  charts.revenue=new Chart(el,{type:'bar',data:{labels,datasets:[
    {label:'CA',data:revs,backgroundColor:th.accent+'55',borderColor:th.accent,borderWidth:1,borderRadius:4,yAxisID:'y'},
    {label:'Marge nette %',data:margin,type:'line',borderColor:'#4ade80',backgroundColor:'transparent',tension:.35,pointRadius:3,pointBackgroundColor:'#4ade80',yAxisID:'y1'},
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:'rgba(255,255,255,.45)',font:{size:10},boxWidth:10,padding:10}}},scales:{
    x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.35)',font:{size:10}}},
    y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.35)',font:{size:10},callback:v=>fmt(v)}},
    y1:{position:'right',grid:{display:false},ticks:{color:'rgba(255,255,255,.35)',font:{size:10},callback:v=>v+'%'}},
  }}});
}

function renderPriceChart(hist,th){
  const el=document.getElementById('priceChart');
  if(!el||!hist?.timestamps?.length)return;
  const labels=hist.timestamps.map(ts=>new Date(ts*1000).toISOString().slice(0,7));
  const prices=hist.prices.map(p=>p?+p.toFixed(2):null);

  charts.price=new Chart(el,{type:'line',data:{labels,datasets:[{
    label:`Cours (${hist.currency||''})`,data:prices,
    borderColor:th.accent,backgroundColor:th.accent+'18',
    fill:true,tension:.3,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:th.accent,
    borderWidth:2,
  }]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${fmtR(ctx.parsed.y,2)} ${hist.currency||''}`}}},scales:{
    x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.35)',font:{size:10},maxTicksLimit:12}},
    y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'rgba(255,255,255,.35)',font:{size:10},callback:v=>fmtR(v,0)}},
  }}});
}

// ─── RULE-BASED INSIGHTS ─────────────────────────────────────────────────────
function generateInsights(data,qInc){
  const fd=data.financialData||{};
  const ks=data.defaultKeyStatistics||{};
  const sd=data.summaryDetail||{};
  const rt=data.recommendationTrend?.trend?.[0]||{};
  const out=[];

  // Revenue trend QoQ
  if(qInc.length>=2){
    const r0=R(qInc[0].totalRevenue),r1=R(qInc[1].totalRevenue);
    if(r0&&r1){
      const g=((r0-r1)/Math.abs(r1))*100;
      if(g>10)out.push({icon:'📈',text:`Fort rebond du CA : +${g.toFixed(1)}% par rapport au trimestre précédent`});
      else if(g>0)out.push({icon:'↗️',text:`CA en progression de +${g.toFixed(1)}% par rapport au trimestre précédent`});
      else out.push({icon:'↘️',text:`CA en baisse de ${Math.abs(g).toFixed(1)}% par rapport au trimestre précédent`});
    }
  }

  // Annual revenue growth
  const revG=R(fd.revenueGrowth);
  if(revG!=null){
    const g=revG*100;
    if(g>15)out.push({icon:'🚀',text:`Croissance annuelle du CA exceptionnelle : +${g.toFixed(1)}%`});
    else if(g<-5)out.push({icon:'⚠️',text:`Contraction du CA annuel : ${g.toFixed(1)}%`});
  }

  // Gross margin
  const gm=R(fd.grossMargins);
  if(gm!=null){
    if(gm>0.6)out.push({icon:'💪',text:`Marge brute exceptionnelle (${(gm*100).toFixed(1)}%) — fort pouvoir de fixation des prix`});
    else if(gm>0.3)out.push({icon:'✅',text:`Bonne marge brute de ${(gm*100).toFixed(1)}%`});
    else if(gm<0.1)out.push({icon:'⚠️',text:`Marge brute étroite (${(gm*100).toFixed(1)}%) — modèle à forte intensité de coûts`});
  }

  // Net margin
  const nm=R(fd.profitMargins);
  if(nm!=null){
    if(nm>0.2)out.push({icon:'🌟',text:`Rentabilité remarquable : marge nette de ${(nm*100).toFixed(1)}%`});
    else if(nm>0.08)out.push({icon:'✅',text:`Marge nette correcte : ${(nm*100).toFixed(1)}%`});
    else if(nm<0)out.push({icon:'🔴',text:`Entreprise déficitaire : marge nette de ${(nm*100).toFixed(1)}%`});
  }

  // FCF
  const fcf=R(fd.freeCashflow),rev=R(fd.totalRevenue);
  if(fcf!=null&&rev){
    const m=fcf/rev;
    if(m>0.15)out.push({icon:'💰',text:`Excellent générateur de cash : FCF = ${fmt(fcf)} (${(m*100).toFixed(1)}% du CA)`});
    else if(m<0)out.push({icon:'⚠️',text:`Free cash flow négatif (${fmt(fcf)}) — surveiller la trésorerie`});
  }

  // ROE
  const roe=R(fd.returnOnEquity);
  if(roe!=null){
    if(roe>0.3)out.push({icon:'🏆',text:`Retour sur capitaux propres excellent : ROE ${(roe*100).toFixed(1)}%`});
    else if(roe<0)out.push({icon:'⚠️',text:`ROE négatif — capitaux propres négatifs ou pertes nettes`});
  }

  // Debt
  const dte=R(fd.debtToEquity);
  if(dte!=null){
    if(dte>150)out.push({icon:'⚠️',text:`Levier financier élevé (D/E : ${dte.toFixed(0)}%) — sensible aux remontées de taux`});
    else if(dte<20)out.push({icon:'🛡️',text:`Bilan solide, faiblement endetté (D/E : ${dte.toFixed(0)}%)`});
  }

  // Liquidity
  const cr=R(fd.currentRatio);
  if(cr!=null&&cr<1)out.push({icon:'⚠️',text:`Ratio de liquidité inférieur à 1 (${cr.toFixed(2)}) — tensions possibles à court terme`});

  // Valuation
  const pe=R(ks.trailingPE);
  if(pe!=null&&pe>0){
    if(pe>40)out.push({icon:'💎',text:`Valorisation premium (PER ${pe.toFixed(1)}×) — le marché parie sur une croissance soutenue`});
    else if(pe<12)out.push({icon:'🎯',text:`PER attractif (${pe.toFixed(1)}×) — potentiellement sous-valorisé`});
  }

  // Analysts consensus
  const total=(rt.strongBuy||0)+(rt.buy||0)+(rt.hold||0)+(rt.sell||0)+(rt.strongSell||0);
  if(total>0){
    const bull=((rt.strongBuy||0)+(rt.buy||0))/total*100;
    if(bull>70)out.push({icon:'👍',text:`Consensus haussier fort : ${Math.round(bull)}% des ${total} analystes recommandent l'achat`});
    else if(bull<30)out.push({icon:'👎',text:`Analystes prudents : seulement ${Math.round(bull)}% recommandent l'achat (${total} avis)`});
    else out.push({icon:'🤝',text:`Consensus neutre : ${Math.round(bull)}% d'achats sur ${total} analystes`});
  }

  return out.slice(0,9);
}
